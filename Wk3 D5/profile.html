<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - Spring Flowers School</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="d-flex align-items-center p-2 mb-2 border border-dark">
        <div class="logo-container me-3">
            <img src="https://placehold.co/100x40?text=School+Logo" alt="School Logo" class="logo-img border border-dark bg-white p-1" style="width: 80px; height: 40px;">
        </div>
        <nav>
            <ul class="nav">
                <li class="nav-item"><a class="nav-link text-dark" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link text-dark border border-dark bg-white" href="profile.html">Student Profile</a></li>
                <li class="nav-item"><a class="nav-link text-dark" href="timetable.html">TimeTable</a></li>
            </ul>
        </nav>
    </header>

    <main class="border border-secondary p-2">
        <div class="profile-container p-4 border border-dark">
            <div class="profile-header d-flex flex-column flex-md-row align-items-center gap-4">
                <div class="student-image-placeholder border border-dark rounded-circle overflow-hidden bg-light" style="width: 150px; height: 150px;">
                    <img src="https://placehold.co/150x150?text=Student+Image" alt="Student Profile Image" class="w-100 h-100 object-fit-cover">
                </div>
                <div class="student-info flex-grow-1 text-center text-md-start">
                    <h2 class="mb-3 border-bottom pb-2">Student Information</h2>
                    <ul class="list-unstyled">
                        <li class="mb-2 text-wrap"><strong>Name:</strong> John Doe</li>
                        <li class="mb-2"><strong>ID:</strong> S12345</li>
                        <li class="mb-2"><strong>Class:</strong> Grade 10-A</li>
                        <li class="mb-2 text-wrap"><strong>Email:</strong> john.doe@example.com</li>
                        <li class="mb-2"><strong>Contact:</strong> +123 456 7890</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-3 py-2 text-muted border-top">
        <p>&copy; 2026 Spring Flowers School. All Rights Reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
